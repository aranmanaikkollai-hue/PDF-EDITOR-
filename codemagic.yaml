# Codemagic configuration for ProPDF Android Build
workflows:
  android-workflow:
    name: ProPDF Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 21 # Updated from 17 to 21 to match Android SDK requirements
      groups:
        - google_play # Optional: for automated deployment
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web App
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          # Use system gradle to bypass corrupt wrapper jar
          gradle assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        notify:
          success: true
          failure: true
